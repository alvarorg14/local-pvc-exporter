replicaCount: 1

image:
  repository: ghcr.io/alvarorg/local-pvc-exporter
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources:
  limits:
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 128Mi

nodeSelector: {}
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule

affinity: {}

hostRoot: /host
hostRootMountPath: /

metricPrefix: local_pvc
scrapeInterval: 5m
unit: bytes
listenAddress: ":8080"
duConcurrency: 4
duTimeout: 10m

service:
  type: ClusterIP
  port: 8080
  annotations: {}

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  namespace: ""

rbac:
  create: true

extraArgs: []
extraEnv: []
