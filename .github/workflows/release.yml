name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set release tag
        run: echo "GORELEASER_CURRENT_TAG=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.event.release.tag_name }}

  chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Set chart version
        run: echo "CHART_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
        env:
          GITHUB_REF_NAME: ${{ github.event.release.tag_name }}

      - name: Package chart
        run: |
          helm package charts/local-pvc-exporter \
            --version "$CHART_VERSION" \
            --app-version "$CHART_VERSION"

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            -u "${{ github.actor }}" --password-stdin

      - name: Push chart
        run: helm push local-pvc-exporter-"$CHART_VERSION".tgz oci://ghcr.io/alvarorg14/charts
