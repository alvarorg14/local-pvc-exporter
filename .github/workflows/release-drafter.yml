name: Release Drafter

on:
  push:
    branches:
      - main

jobs:
  update_release_draft:
    name: Update Stable Release Draft
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7
        with:
          config-name: release-drafter-template.yml
          prerelease: false
          include-pre-releases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update_prerelease_draft:
    name: Update Prerelease Draft
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7
        with:
          config-name: release-drafter-template.yml
          prerelease: true
          prerelease-identifier: rc
          include-pre-releases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}