name: Release Drafter

on:
  push:
    branches:
      - main

jobs:
  update_release_draft:
    name: Update Stable Release Draft
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@139054aeaa9adc52ab36ddf67437541f039b88e2 # v7
        with:
          config-name: release-drafter-template.yml
          prerelease: false
          include-pre-releases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update_prerelease_draft:
    name: Update Prerelease Draft
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@139054aeaa9adc52ab36ddf67437541f039b88e2 # v7
        with:
          config-name: release-drafter-template.yml
          prerelease: true
          prerelease-identifier: rc
          include-pre-releases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}